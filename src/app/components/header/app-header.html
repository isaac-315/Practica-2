<header class="app-header flex items-center justify-between">

  <!-- Marca -->
  <span class="app-header__brand">
    {{ brand() | uppercase }}
  </span>

  <!-- Navegación -->
  <nav class="app-header__nav flex items-center gap-4 ml-auto">

    <a
      class="nav-link"
      routerLink="/"
      routerLinkActive="nav-link--active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Inicio
    </a>

    <a
      class="nav-link"
      routerLink="/students"
      routerLinkActive="nav-link--active"
    >
      Estudiantes
    </a>

    <a
      class="nav-link"
      routerLink="/layouts"
      routerLinkActive="nav-link--active"
    >
      Layouts
    </a>

    <a
      class="nav-link"
      routerLink="/signup"
      routerLinkActive="nav-link--active"
    >
      Sign Up
    </a>

    <a
      class="nav-link"
      routerLink="/profile"
      routerLinkActive="nav-link--active"
    >
      Profile
    </a>

    <a class="nav-link" routerLink="/projects" routerLinkActive="nav-link--active">
      Configurar Proyectos
    </a>

  </nav>

</header>
