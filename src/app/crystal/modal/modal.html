<button class="btn" onclick="my_modal_1.showModal()">
  Abrir Modal
</button>

<dialog id="my_modal_1" class="modal">

  <div class="modal-box">

    <h3 class="text-lg font-bold">
      Hola 👋
    </h3>

    <p class="py-4">
      Este es un modal usando DaisyUI.
    </p>

    <div class="modal-action">
      <form method="dialog">
        <button class="btn">
          Cerrar
        </button>
      </form>
    </div>

  </div>

</dialog>
